<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#F7F1E7">
    <meta name="description" content="Today With God is a quiet prayer companion with memory verses for gratitude, peace, healing, wisdom, protection, provision and purpose.">
    <meta property="og:title" content="Today With God">
    <meta property="og:description" content="A prayer and memory verse for every season.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <title>Today With God</title>
    <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
    <noscript>
        <div class="noscript">Today With God needs JavaScript enabled to open the prayer library.</div>
    </noscript>

    <div class="site-shell">
        <header class="site-header">
            <a class="brand" href="#home" aria-label="Today With God home">
                <span class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 48 48" role="img">
                        <path d="M24 8v32M12 20h24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                        <path d="M24 3v2M24 43v2M3 24h2M43 24h2M9.2 9.2l1.4 1.4M37.4 37.4l1.4 1.4M38.8 9.2l-1.4 1.4M10.6 37.4l-1.4 1.4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </span>
                <span>
                    <strong>Today With God</strong>
                    <small>A prayer and memory verse for every season.</small>
                </span>
            </a>
            <nav class="desktop-nav" aria-label="Primary navigation">
                <a href="#home" data-nav="home">Home</a>
                <a href="#explore" data-nav="explore">Explore</a>
                <a href="#saved" data-nav="saved">Saved</a>
                <a href="#verses" data-nav="verses">Verses</a>
            </nav>
            <button class="icon-button" type="button" data-action="toggle-theme" aria-label="Toggle appearance">
                <span data-theme-icon aria-hidden="true">☾</span>
            </button>
        </header>

        <main id="app" class="app-main" tabindex="-1"></main>

        <nav class="bottom-nav" aria-label="Primary navigation">
            <a href="#home" data-nav="home">
                <span aria-hidden="true">⌂</span>
                <small>Home</small>
            </a>
            <a href="#explore" data-nav="explore">
                <span aria-hidden="true">⌕</span>
                <small>Explore</small>
            </a>
            <a href="#saved" data-nav="saved">
                <span aria-hidden="true">♡</span>
                <small>Saved</small>
            </a>
            <a href="#verses" data-nav="verses">
                <span aria-hidden="true">▤</span>
                <small>Verses</small>
            </a>
        </nav>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="./assets/js/app.js" defer></script>
</body>
</html>
